name: Bug report
description: Report a reproducible bug in Agent Control Plane
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, files, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and any relevant workspace layout details.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Logs, screenshots, or related links.
